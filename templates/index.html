<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
.preview-container {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

canvas {
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 120px;
}
</style>

<!-- MERGE -->
<div>
    <h2>Merge PDFs</h2>
    <input type="file" id="mergeFiles" multiple onchange="previewMergePDF()">
    <div class="preview-container" id="mergePreview"></div>
</div>

<!-- SPLIT -->
<div>
    <h2>Split PDF</h2>
    <input type="file" id="splitFile" onchange="previewSplitPDF()">
    <div class="preview-container" id="splitPreview"></div>
</div>

<script>
const BASE_URL = "https://convertify-ci3g.onrender.com";

// ================= LOAD PDF PREVIEW =================
async function renderPDF(file, containerId) {
    const fileReader = new FileReader();

    fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);

        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        const page = await pdf.getPage(1);

        const viewport = page.getViewport({ scale: 0.5 });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

        document.getElementById(containerId).appendChild(canvas);
    };

    fileReader.readAsArrayBuffer(file);
}

// ================= MERGE PREVIEW =================
function previewMergePDF() {
    const files = document.getElementById("mergeFiles").files;
    const container = document.getElementById("mergePreview");

    container.innerHTML = "";

    for (let file of files) {
        renderPDF(file, "mergePreview");
    }
}

// ================= SPLIT PREVIEW =================
function previewSplitPDF() {
    const file = document.getElementById("splitFile").files[0];
    const container = document.getElementById("splitPreview");

    container.innerHTML = "";

    if (file) {
        renderPDF(file, "splitPreview");
    }
}
</script>
