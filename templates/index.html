<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Toolkit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #111827;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

h2 {
    margin-bottom: 15px;
}

input, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
}

input {
    border: 1px solid #ddd;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.disabled {
    background: #9ca3af !important;
    cursor: not-allowed;
}

.note {
    font-size: 12px;
    color: #666;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    PDF Toolkit 🚀
</header>

<div class="container">

    <!-- MERGE -->
    <div class="card">
        <h2>Merge PDFs</h2>
        <form action="/merge" method="post" enctype="multipart/form-data">
            <input type="file" name="files" multiple required>
            <button type="submit">Merge PDFs</button>
        </form>
    </div>

    <!-- SPLIT -->
    <div class="card">
        <h2>Split PDF</h2>
        <form action="/split" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>

            <input type="number" name="start_page" placeholder="Start Page (e.g. 1)" required>
            <input type="number" name="end_page" placeholder="End Page (e.g. 5)" required>

            <button type="submit">Extract Pages</button>
        </form>

        <div class="note">Example: 2–5 extracts pages 2 to 5</div>
    </div>

    <!-- DOCX -->
    <div class="card">
        <h2>DOCX → PDF</h2>
        <input type="file" disabled>
        <button class="disabled">Coming Soon</button>
        <div class="note">Requires Docker + LibreOffice</div>
    </div>

</div>

</body>
</html>
