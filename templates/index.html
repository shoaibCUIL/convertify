<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
.convertify-container {
    font-family: 'Poppins', sans-serif;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.drop-zone {
    border: 2px dashed #ccc;
    padding: 30px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 15px;
}

.preview-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.preview-item {
    position: relative;
    width: 120px;
    cursor: grab;
}

.preview-item canvas {
    width: 100%;
    border-radius: 6px;
}

.remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    cursor: pointer;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
}

.section {
    margin-bottom: 40px;
}
</style>

<div class="convertify-container">

<!-- MERGE -->
<div class="section">
<h2>Merge PDFs</h2>

<div class="drop-zone" onclick="document.getElementById('mergeInput').click()">
    Drag & Drop PDFs or Click
</div>

<input type="file" id="mergeInput" multiple hidden>

<div class="preview-grid" id="mergePreview"></div>

<button onclick="mergePDF()">Merge PDFs</button>
</div>

<!-- SPLIT -->
<div class="section">
<h2>Split PDF</h2>

<input type="file" id="splitInput">
<div id="splitPreview"></div>

<input type="number" id="startPage" placeholder="Start Page">
<input type="number" id="endPage" placeholder="End Page">

<button onclick="splitPDF()">Split PDF</button>
</div>

</div>

<script>
const BASE_URL = "https://convertify-production-5104.up.railway.app";

let mergeFiles = [];

// ================= DRAG DROP =================
document.querySelector(".drop-zone").addEventListener("dragover", e => e.preventDefault());

document.querySelector(".drop-zone").addEventListener("drop", e => {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
});

document.getElementById("mergeInput").addEventListener("change", (e) => {
    handleFiles(e.target.files);
});

// ================= HANDLE FILES =================
function handleFiles(files) {
    for (let file of files) {
        mergeFiles.push(file);
    }
    renderMergePreview();
}

// ================= PREVIEW =================
function renderMergePreview() {
    const container = document.getElementById("mergePreview");
    container.innerHTML = "";

    mergeFiles.forEach((file, index) => {
        const div = document.createElement("div");
        div.className = "preview-item";
        div.draggable = true;

        div.ondragstart = (e) => {
            e.dataTransfer.setData("index", index);
        };

        div.ondrop = (e) => {
            e.preventDefault();
            let from = e.dataTransfer.getData("index");
            let temp = mergeFiles[from];
            mergeFiles[from] = mergeFiles[index];
            mergeFiles[index] = temp;
            renderMergePreview();
        };

        div.ondragover = (e) => e.preventDefault();

        const remove = document.createElement("button");
        remove.innerText = "×";
        remove.className = "remove-btn";
        remove.onclick = () => {
            mergeFiles.splice(index, 1);
            renderMergePreview();
        };

        renderPDF(file, div);

        div.appendChild(remove);
        container.appendChild(div);
    });
}

// ================= PDF RENDER =================
async function renderPDF(file, container) {
    const reader = new FileReader();

    reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        const page = await pdf.getPage(1);

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const viewport = page.getViewport({ scale: 0.5 });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: ctx, viewport }).promise;

        container.appendChild(canvas);
    };

    reader.readAsArrayBuffer(file);
}

// ================= MERGE =================
async function mergePDF() {
    if (mergeFiles.length === 0) return alert("Select files");

    let formData = new FormData();
    mergeFiles.forEach(f => formData.append("files", f));

    let res = await fetch(BASE_URL + "/merge", {
        method: "POST",
        body: formData
    });

    let blob = await res.blob();
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "merged.pdf";
    a.click();
}

// ================= SPLIT PREVIEW =================
document.getElementById("splitInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const container = document.getElementById("splitPreview");
    container.innerHTML = "";

    if (file) renderPDF(file, container);
});

// ================= SPLIT =================
async function splitPDF() {
    let file = document.getElementById("splitInput").files[0];
    let start = document.getElementById("startPage").value;
    let end = document.getElementById("endPage").value;

    if (!file || !start || !end) return alert("Fill all fields");

    let formData = new FormData();
    formData.append("file", file);
    formData.append("start_page", start);
    formData.append("end_page", end);

    let res = await fetch(BASE_URL + "/split", {
        method: "POST",
        body: formData
    });

    let blob = await res.blob();
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "split.pdf";
    a.click();
}
</script>
